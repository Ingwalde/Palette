<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Saved color palettes in Palette web app." />
  <title>Palette | Favorites</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html" aria-label="Palette home">
      <span class="logo__mark">P</span>
      <span class="logo__text">Palette</span>
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      <a class="site-nav__link" href="index.html">Home</a>
      <a class="site-nav__link site-nav__link--active" href="favorites.html">Favorites</a>
      <a class="site-nav__link" href="export.html">Export</a>
    </nav>
  </header>

  <main>
    <section class="page-hero section">
      <p class="eyebrow">Saved palettes</p>
      <h1>Your favorite palettes</h1>
      <p>Favorites are stored locally in your browser with localStorage.</p>
    </section>

    <section class="section">
      <div class="section-heading">
        <div>
          <h2>Favorites</h2>
          <p class="muted" id="favoriteCount"></p>
        </div>
        <button class="button button--danger" id="clearFavoritesBtn" type="button">Clear favorites</button>
      </div>

      <div class="palette-grid" id="favoritesGrid"></div>
    </section>
  </main>

  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/pages/favorites.js"></script>
</body>
</html>
