<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Export color palettes as CSS, SCSS, JSON, TXT or PNG." />
  <title>Palette v3.0 | Export</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html" aria-label="Palette home">
      <span class="logo__mark">P</span>
      <span class="logo__text">Palette</span>
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      <a class="site-nav__link" href="index.html">Home</a>
      <a class="site-nav__link" href="favorites.html">Favorites</a>
      <a class="site-nav__link site-nav__link--active" href="export.html">Export</a>
      <a class="site-nav__link" href="admin.html">Admin</a>
    </nav>
  </header>

  <main>
    <section class="page-hero section">
      <p class="eyebrow">Developer tools</p>
      <h1>Export palettes</h1>
      <p>Generate ready-to-use CSS variables, SCSS variables, JSON, TXT or a polished PNG preview from backend data.</p>
    </section>

    <section class="section export-layout">
      <aside class="export-panel" aria-label="Export settings">
        <label class="field">
          <span>Palette source</span>
          <select class="select" id="sourceSelect">
            <option value="all">All palettes</option>
            <option value="favorites">Favorites only</option>
          </select>
        </label>

        <label class="field">
          <span>Format</span>
          <select class="select" id="formatSelect">
            <option value="css">CSS variables</option>
            <option value="scss">SCSS variables</option>
            <option value="json">JSON</option>
            <option value="txt">TXT</option>
            <option value="png">PNG image</option>
          </select>
        </label>

        <div class="export-panel__actions">
          <button class="button button--primary" id="previewExportBtn" type="button">Preview result</button>
          <button class="button button--secondary" id="downloadExportBtn" type="button">Download file</button>
        </div>
      </aside>

      <section class="export-result" aria-labelledby="export-title">
        <div class="section-heading section-heading--compact">
          <div>
            <p class="eyebrow">Preview</p>
            <h2 id="export-title">Generated output</h2>
          </div>
        </div>

        <pre class="code-output" id="textPreview"><code id="exportOutput"></code></pre>

        <div class="image-preview hidden" id="imagePreview">
          <div class="image-preview__frame">
            <img id="exportPreviewImage" alt="PNG export preview" />
          </div>
          <p class="image-preview__caption" id="imagePreviewCaption">
            PNG preview will appear here.
          </p>
        </div>
      </section>
    </section>
  </main>

  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/pages/export.js"></script>
</body>
</html>
